<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow Viz - Multi Source Demo</title>
  <script>
    p5 = { disableFriendlyErrors: true };
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #0a0a0f; }
    canvas { display: block; }
    #ui {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #e8d5b7;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      z-index: 100;
      line-height: 1.6;
      background: rgba(10, 10, 15, 0.8);
      padding: 15px;
      border-radius: 8px;
      border: 1px solid rgba(232, 213, 183, 0.2);
    }
    #ui .key { color: #73c99c; }
    #ui .title { color: #fff; font-weight: bold; font-size: 13px; margin-bottom: 8px; }
    #ui .source { color: #73c99c; font-weight: bold; }
    #ui .muted { color: #666; }
    #ui .metric { display: inline-block; margin-right: 15px; }
    #status {
      position: fixed;
      top: 20px;
      right: 20px;
      color: #666;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      text-align: right;
      background: rgba(10, 10, 15, 0.8);
      padding: 10px;
      border-radius: 8px;
    }
    #info-panel {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      color: #e8d5b7;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      z-index: 100;
      background: rgba(10, 10, 15, 0.9);
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(232, 213, 183, 0.2);
      display: none;
    }
    #info-panel.visible { display: block; }
  </style>
</head>
<body>
<div id="ui">
  <div class="title">FLOW VIZ <span class="muted">|</span> <span id="current-source" class="source">POLYMARKET</span></div>
  <span class="key">[1]</span> Polymarket <span class="muted">|</span>
  <span class="key">[2]</span> Bitcoin Mempool <span class="muted">|</span>
  <span class="key">[3]</span> GitHub (qt_djm) <span class="muted">|</span>
  <span class="key">[4]</span> Stress Test<br>
  <span class="key">[s]</span> Save PNG <span class="muted">|</span>
  <span class="key">[r]</span> Regenerate <span class="muted">|</span>
  <span class="key">[space]</span> Pause <span class="muted">|</span>
  <span class="key">[d]</span> Debug<br>
  <div id="metrics" class="muted" style="margin-top: 8px;">
    <span class="metric">Markets: <span id="market-count">-</span></span>
    <span class="metric">Particles: <span id="particle-count">-</span></span>
    <span class="metric">FPS: <span id="fps">-</span></span>
  </div>
</div>
<div id="status">
  <span id="data-status">Initializing...</span><br>
  <span id="seed" class="muted">-</span>
</div>
<div id="info-panel">
  <span id="hover-info"></span>
</div>

<!-- Core modules -->
<script src="config/default.js"></script>
<script src="core/event-bus.js"></script>
<script src="core/plugin.js"></script>
<script src="core/random.js"></script>
<script src="adapters/data-source.js"></script>
<script src="adapters/bitcoin-mempool.js"></script>
<script src="adapters/github.js"></script>
<script src="core/fluid-engine.js"></script>
<script src="core/orchestrator.js"></script>

<script>
// === MULTI-SOURCE DEMO ===

const SOURCES = {
  polymarket: {
    name: 'POLYMARKET',
    type: 'mock',
    mockDataSet: 'default',
    particleCount: 800,
    description: 'Prediction market capital flows'
  },
  bitcoin: {
    name: 'BITCOIN MEMPOOL',
    type: 'bitcoin-mempool',
    apiUrl: 'https://mempool.space/api/v1',
    particleCount: 2000,
    description: 'Transaction fee market, blocks as drains'
  },
  github: {
    name: 'GITHUB (qt_djm)',
    type: 'github',
    username: 'qt_djm',
    maxRepos: 8,
    particleCount: 600,
    description: 'Repository attention economy'
  },
  stress: {
    name: 'STRESS TEST',
    type: 'mock',
    mockDataSet: 'stress-test',
    particleCount: 1600,
    description: '12 markets, 1600 particles'
  }
};

let currentSource = 'polymarket';

// Override DataSourceFactory to handle our custom types
const originalCreate = DataSourceFactory.create;
DataSourceFactory.create = function(config) {
  if (config.type === 'bitcoin-mempool') {
    return new BitcoinMempoolAdapter(config);
  }
  if (config.type === 'github') {
    return new GitHubAdapter(config);
  }
  return originalCreate(config);
};

function switchSource(key) {
  const source = SOURCES[key];
  if (!source) return;
  
  currentSource = key;
  
  // Update UI
  document.getElementById('current-source').textContent = source.name;
  
  // Update config
  orchestrator.updateConfig('dataSource.type', source.type);
  orchestrator.updateConfig('dataSource.mockDataSet', source.mockDataSet || 'default');
  orchestrator.updateConfig('particles.count', source.particleCount);
  
  // Special handling for custom adapters
  if (source.apiUrl) {
    orchestrator.updateConfig('dataSource.apiUrl', source.apiUrl);
  }
  if (source.username) {
    orchestrator.updateConfig('dataSource.username', source.username);
  }
  if (source.maxRepos) {
    orchestrator.updateConfig('dataSource.maxRepos', source.maxRepos);
  }
  
  // Regenerate
  orchestrator.regenerate();
  
  console.log(`Switched to: ${source.name}`);
  console.log(`Description: ${source.description}`);
}

// UI update
function updateUI() {
  const status = orchestrator.getStatus();
  
  document.getElementById('market-count').textContent = status.markets;
  document.getElementById('particle-count').textContent = status.particles;
  document.getElementById('seed').textContent = status.config.seed || '-';
  
  const dataStatus = status.dataSource.status;
  const dataSource = status.dataSource.type;
  document.getElementById('data-status').textContent = 
    `${dataSource.toUpperCase()} | ${dataStatus}`;
}

// FPS counter
let frameCount = 0;
let lastFpsTime = 0;
let fps = 60;

function updateFPS() {
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    fps = frameCount;
    frameCount = 0;
    lastFpsTime = now;
    document.getElementById('fps').textContent = fps;
  }
}

// Event subscriptions
Events.on('ENGINE_TICK', () => {
  updateFPS();
  if (frameCount % 30 === 0) {
    updateUI();
  }
});

Events.on('DATA_LOADED', (data) => {
  console.log(`${data.source}: ${data.markets} markets loaded`);
  updateUI();
});

Events.on('DATA_ERROR', (err) => {
  console.error(`${err.source} error:`, err.error);
});

Events.on('MARKET_HOVER', ({ market }) => {
  const panel = document.getElementById('info-panel');
  const info = document.getElementById('hover-info');
  
  let details = `<strong>${market.data.question}</strong><br>`;
  details += `Volume: ${(market.data.volume24h / 1000).toFixed(0)}K | `;
  details += `Price: ${(market.data.yesPrice * 100).toFixed(0)}%<br>`;
  
  if (market.data.metadata) {
    if (market.data.metadata.avgFee) {
      details += `Avg Fee: ${market.data.metadata.avgFee.toFixed(1)} sat/vB | `;
      details += `Urgency: ${(market.data.metadata.blockUrgency * 100).toFixed(0)}%`;
    }
    if (market.data.metadata.language) {
      details += `Language: ${market.data.metadata.language} | `;
      details += `Stars: ${market.data.metadata.stars}`;
    }
    if (market.data.metadata.description) {
      details += `<br>${market.data.metadata.description}`;
    }
  }
  
  info.innerHTML = details;
  panel.classList.add('visible');
});

Events.on('MARKET_LEAVE', () => {
  document.getElementById('info-panel').classList.remove('visible');
});

Events.on('MEMPOOL_BLOCK_FOUND', (data) => {
  console.log(`Block ${data.height} found! Draining mempool...`);
  // Visual pulse effect could be added here
});

// P5.js hooks
function setup() {
  // Seed resolved by orchestrator (?seed= or random per load).
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);

  // Apply initial config
  const source = SOURCES[currentSource];
  CONFIG.dataSource.type = source.type;
  CONFIG.dataSource.mockDataSet = source.mockDataSet || 'default';
  CONFIG.particles.count = source.particleCount;
  
  // Trigger orchestrator setup
  orchestrator.setup(this);
}

function draw() {
  orchestrator.draw();
}

function windowResized() {
  orchestrator.handleResize();
}

function keyPressed() {
  // Source switching
  if (key === '1') switchSource('polymarket');
  if (key === '2') switchSource('bitcoin');
  if (key === '3') switchSource('github');
  if (key === '4') switchSource('stress');
  
  // Other keys
  orchestrator.handleKeyPress(key);
  
  // Debug toggle
  if (key === 'd' || key === 'D') {
    orchestrator.config.debug.enabled = !orchestrator.config.debug.enabled;
    console.log('Debug:', orchestrator.config.debug.enabled);
  }
}

function mouseMoved() {
  orchestrator.handleMouseMove(mouseX, mouseY);
}

function mouseClicked() {
  orchestrator.handleMouseClick(mouseX, mouseY);
}

// Initial log
console.log('=== FLOW VIZ MULTI-SOURCE DEMO ===');
console.log('Sources:');
Object.entries(SOURCES).forEach(([key, src]) => {
  console.log(`  [${key}] ${src.name}: ${src.description}`);
});
console.log('');
console.log('Press 1-4 to switch sources');
console.log('Mouse over markets for details');
</script>
</body>
</html>
